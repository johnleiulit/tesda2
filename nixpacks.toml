[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'nodejs_20']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci',
    'npm run build'
]

[phases.build]
cmds = [
    'php artisan storage:link || true',
    'php artisan config:clear',
    'php artisan cache:clear'
]

[start]
cmd = 'php artisan migrate --force && echo "Starting server on 0.0.0.0:$PORT" && php artisan serve --host=0.0.0.0 --port=$PORT --verbose'
