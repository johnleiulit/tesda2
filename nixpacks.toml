[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'nodejs_20']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci',
    'npm run build'
]

[phases.build]
cmds = [
    'php artisan storage:link || true'
]

[start]
cmd = 'sh -c "php artisan migrate --force && echo Starting server on port $PORT && exec php artisan serve --host=0.0.0.0 --port=$PORT"'
